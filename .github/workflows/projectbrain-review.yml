name: ProjectBrain Memory Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  memory_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        env:
          COGNEE_API_KEY: ${{ secrets.COGNEE_API_KEY }}
        run: |
          pip install git+https://github.com/topoteretes/cognee litellm fastembed python-dotenv

      - name: Generate PR Diff
        run: |
          git diff origin/master...HEAD > pr_changes.diff

      - name: Run Reviewer Agent
        env:
          COGNEE_API_KEY: ${{ secrets.COGNEE_API_KEY }}
          COGNEE_API_URL: ${{ secrets.COGNEE_API_URL }}
        run: |
          python reviewer_agent.py pr_changes.diff
